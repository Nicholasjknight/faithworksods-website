name: static-site

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Parse asset generators
        run: python -m compileall -q scripts
      - name: Validate public output
        run: python scripts/validate-static-site.py
